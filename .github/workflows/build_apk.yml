name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # يتيح لك تشغيله يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🎯 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'  # استخدم أحدث إصدار ثابت
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get
        working-directory: ./android-app  # عدّل المسار حسب مجلد مشروع Flutter

      - name: 🛠️ Build APK
        run: flutter build apk --release
        working-directory: ./android-app

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ./android-app/build/app/outputs/flutter-apk/app-release.apk
