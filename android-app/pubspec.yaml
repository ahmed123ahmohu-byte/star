name: ai_assistant
description: AI Assistant with GitHub integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # واجهة مستخدم
  material_3: ^1.0.0
  animations: ^2.0.0
  lottie: ^2.3.0
  # إدارة الحالة
  provider: ^6.0.0
  # الشبكات
  dio: ^5.3.0
  # تخزين محلي
  shared_preferences: ^2.2.0
  # OAuth
  flutter_web_auth: ^0.5.0
  # JSON
  json_annotation: ^4.8.0
  # أيقونات
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
