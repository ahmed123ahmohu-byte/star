name: ai_assistant
description: AI Assistant with GitHub integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # واجهة مستخدم
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0  # اختياري لتحسين الخطوط
  animations: ^2.0.8
  lottie: ^3.0.0

  # إدارة الحالة
  provider: ^6.1.1

  # الشبكات
  dio: ^5.4.0

  # تخزين محلي
  shared_preferences: ^2.2.2

  # OAuth
  flutter_web_auth: ^0.5.0

  # JSON
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
